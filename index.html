function getRank(xp){
  let ri=0;
  for(let i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].xpRequired){ri=i;break;}}
  const cur=RANKS[ri],nxt=RANKS[Math.min(ri+1,RANKS.length-1)];
  const isMax=ri===RANKS.length-1;
  const into=xp-cur.xpRequired;
  const need=isMax?1:nxt.xpRequired-cur.xpRequired;
  const pct=isMax?100:Math.min(100,Math.round((into/need)*100));
  const lv=ri*10+Math.floor((into/(need||1))*10);
  return{cur,nxt,isMax,into,need,pct,lv,ri};
}

function useTimer(initSecs){
  const[secs,setSecs]=useState(initSecs);
  const[running,setRunning]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(running&&secs>0){ref.current=setInterval(()=>setSecs(s=>s-1),1000);}
    else{clearInterval(ref.current);if(secs<=0)setRunning(false);}
    return()=>clearInterval(ref.current);
  },[running,secs]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return{secs,running,setRunning,setSecs,fmt,reset:v=>{setSecs(v);setRunning(false);}};
}

          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
            {[["TOTAL",total,"#888"],["WINS",wins,"#A8FF78"],["LOSSES",losses,"#FF4D6D"],["BE",bes,"#FFD60A"]].map(([l,v,c])=>(<div key={l} style={{background:card,border:`1px solid ${bdr}`,borderRadius:6,padding:"10px",textAlign:"center"}}><div style={{fontSize:8,color:"#444",letterSpacing:1,marginBottom:3}}>{l}</div><div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div></div>))}
          </div>
          <Card>
            <Lbl>LOG NEW TRADE · +{XP_VAL.trade} XP</Lbl>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:4}}>PAIR</div>
                <select value={tradeForm.pair} onChange={e=>setTradeForm(p=>({...p,pair:e.target.value}))} style={{background:"#0A0918",border:`1px solid ${bdr}`,borderRadius:4,padding:"9px 12px",color:"#CCC",fontSize:12,fontFamily:"inherit",outline:"none",width:"100%"}}>{PAIRS.map(p=><option key={p}>{p}</option>)}</select>
              </div>
              <div><div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:4}}>DIRECTION</div>
                <div style={{display:"flex",gap:6}}>{["Long","Short"].map(d=>(<button key={d} onClick={()=>setTradeForm(p=>({...p,dir:d}))} style={{flex:1,padding:"9px 0",borderRadius:4,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${tradeForm.dir===d?(d==="Long"?"#A8FF78":"#FF4D6D"):bdr}`,background:tradeForm.dir===d?(d==="Long"?"#A8FF7815":"#FF4D6D15"):card,color:tradeForm.dir===d?(d==="Long"?"#A8FF78":"#FF4D6D"):"#555",fontSize:11,fontWeight:700}}>{d}</button>))}</div>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <div><div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:4}}>RR ACHIEVED</div><Inp type="number" step="0.1" min="0" placeholder="e.g. 2.5" value={tradeForm.rr} onChange={e=>setTradeForm(p=>({...p,rr:e.target.value}))}/></div>
              <div><div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:4}}>OUTCOME</div>
                <div style={{display:"flex",gap:4}}>{["Win","Loss","BE"].map(o=>{const oc=o==="Win"?"#A8FF78":o==="Loss"?"#FF4D6D":"#FFD60A";return<button key={o} onClick={()=>setTradeForm(p=>({...p,outcome:o}))} style={{flex:1,padding:"9px 0",borderRadius:4,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${tradeForm.outcome===o?oc:bdr}`,background:tradeForm.outcome===o?`${oc}15`:card,color:tradeForm.outcome===o?oc:"#555",fontSize:10,fontWeight:700}}>{o}</button>;})}
                </div>
              </div>
            </div>
            <Inp placeholder="Notes (optional)" value={tradeForm.note} onChange={e=>setTradeForm(p=>({...p,note:e.target.value}))} style={{marginBottom:8}}/>
            <Btn onClick={logTrade} style={{width:"100%",padding:"11px 0"}}>LOG TRADE</Btn>
          </Card>
          {trades.length>0&&(<div><Lbl>TRADE HISTORY</Lbl><div style={{display:"flex",flexDirection:"column",gap:4}}>{trades.map(t=>{const oc=t.outcome==="Win"?"#A8FF78":t.outcome==="Loss"?"#FF4D6D":"#FFD60A";return(<div key={t.id} style={{background:card,border:`1px solid ${bdr}`,borderRadius:4,padding:"10px 13px",display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontSize:12,color:"#CCC",fontWeight:700}}>{t.pair} <span style={{color:t.dir==="Long"?"#A8FF78":"#FF4D6D",fontSize:10}}>{t.dir}</span></div>{t.note&&<div style={{fontSize:10,color:"#555",marginTop:2}}>{t.note}</div>}</div><div style={{textAlign:"right"}}><div style={{fontSize:11,color:oc,fontWeight:700}}>{t.outcome}</div><div style={{fontSize:9,color:"#444"}}>RR {t.rr} · {t.time}</div></div></div>);})}</div></div>)}
        </div>)}

        {tab==="timers"&&(<div>
          <Card>
            <Lbl>SESSION TIMER — 2 HOUR LIMIT</Lbl>
            <div style={{textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:52,fontWeight:900,color:session.secs<1800?"#FF4D6D":session.secs<3600?"#FFD60A":"#A8FF78",letterSpacing:4,textShadow:`0 0 20px ${session.secs<1800?"#FF4D6D":session.secs<3600?"#FFD60A":"#A8FF78"}40`}}>{session.fmt(session.secs)}</div>
              <div style={{fontSize:9,color:"#444",marginTop:4,letterSpacing:2}}>{session.secs<1800?"⚠ DECISION FATIGUE ZONE":session.secs<3600?"APPROACHING LIMIT":"SESSION ACTIVE"}</div>
            </div>
            <div style={{background:"#12112A",borderRadius:2,height:5,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${Math.round((1-session.secs/7200)*100)}%`,background:session.secs<1800?"#FF4D6D":session.secs<3600?"#FFD60A":"#A8FF78",transition:"width 1s",borderRadius:2}}/></div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>session.setRunning(r=>!r)} color={session.running?"#FFD60A":"#A8FF78"} style={{flex:1,padding:"10px 0"}}>{session.running?"⏸ PAUSE":"▶ START"}</Btn>
              <Btn onClick={()=>session.reset(7200)} color="#555" style={{padding:"10px 16px"}}>↺ RESET</Btn>
            </div>
          </Card>
          <Card>
            <Lbl>REVENGE TRADE COOLDOWN — 1 HOUR RULE</Lbl>
            <div style={{textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:52,fontWeight:900,letterSpacing:4,color:revenge.running?(revenge.secs>1800?"#FF4D6D":"#FFD60A"):"#333",textShadow:revenge.running?`0 0 20px ${revenge.secs>1800?"#FF4D6D":"#FFD60A"}40`:"none"}}>{revenge.fmt(revenge.secs)}</div>
              <div style={{fontSize:9,color:"#444",marginTop:4,letterSpacing:2}}>{revenge.running?(revenge.secs>1800?"🔴 LOCKED — DO NOT TRADE":"🟡 COOLING DOWN"):(revenge.secs===0?"✅ COOLDOWN COMPLETE":"TRIGGER AFTER A LOSS")}</div>
            </div>
            <div style={{background:"#12112A",borderRadius:2,height:5,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${Math.round((1-revenge.secs/3600)*100)}%`,background:revenge.secs>1800?"#FF4D6D":"#FFD60A",transition:"width 1s",borderRadius:2}}/></div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={()=>{revenge.reset(3600);revenge.setRunning(true);}} color="#FF4D6D" style={{flex:1,padding:"10px 0"}}>🚨 I JUST TOOK A LOSS</Btn>
              <Btn onClick={()=>revenge.reset(3600)} color="#555" style={{padding:"10px 16px"}}>↺</Btn>
            </div>
          </Card>
        </div>)}

        {tab==="weekly"&&(<div>
          <Lbl>WEEK STARTING {weekKey}</Lbl>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            {[["DISCIPLINED DAYS",weekDisciplined,"#A8FF78"],["RULE BREAKS",weekBroken,"#FF4D6D"],["TRADES",weekTrades.length,rc],["WIN RATE",weekTrades.length?`${weekWR}%`:"—",weekWR>=50?"#A8FF78":"#FF4D6D"]].map(([l,v,c])=>(<div key={l} style={{background:card,border:`1px solid ${bdr}`,borderRadius:6,padding:"14px",textAlign:"center"}}><div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:4}}>{l}</div><div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div></div>))}
          </div>
          {topBroken.length>0&&(<Card><Lbl>TOP BROKEN RULES THIS WEEK</Lbl>{topBroken.map(([rule,count])=>(<div key={rule} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${bdr}`}}><span style={{fontSize:12,color:"#CCC"}}>{rule}</span><span style={{fontSize:11,fontWeight:700,color:"#FF4D6D"}}>{count}x</span></div>))}</Card>)}
          {weekTrades.length>0&&(<Card><Lbl>THIS WEEK'S TRADES</Lbl>{weekTrades.map(t=>{const oc=t.outcome==="Win"?"#A8FF78":t.outcome==="Loss"?"#FF4D6D":"#FFD60A";return(<div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:`1px solid ${bdr}`}}><span style={{fontSize:12,color:"#CCC"}}>{t.pair} <span style={{fontSize:10,color:t.dir==="Long"?"#A8FF78":"#FF4D6D"}}>{t.dir}</span></span><div><span style={{fontSize:11,fontWeight:700,color:oc}}>{t.outcome}</span><span style={{fontSize:9,color:"#444",marginLeft:8}}>RR {t.rr}</span></div></div>);})}</Card>)}
          {weekJournals.length===0&&weekTrades.length===0&&<div style={{textAlign:"center",padding:40,color:"#333",fontSize:12,letterSpacing:2}}>NO DATA YET THIS WEEK.</div>}
        </div>)}

        {tab==="mood"&&(<div>
          <Card>
            <Lbl>PRE-SESSION MENTAL STATE · +{XP_VAL.mood} XP</Lbl>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {MOODS.map(m=>{const sel=moods[0]?.date===today&&moods[0]?.v===m.v;return(<button key={m.v} onClick={()=>logMood(m.v)} style={{flex:1,minWidth:80,padding:"14px 8px",borderRadius:4,cursor:"pointer",fontFamily:"inherit",textAlign:"center",background:sel?`${m.color}20`:card,border:`1px solid ${sel?m.color:bdr}`,transition:"all .2s"}}><div style={{fontSize:22,marginBottom:4}}>{m.icon}</div><div style={{fontSize:9,color:sel?m.color:"#555",fontWeight:700,letterSpacing:1}}>{m.label.toUpperCase()}</div></button>);})}
            </div>
          </Card>
          {moods.length>0&&(<Card><Lbl>MOOD HISTORY</Lbl><div style={{display:"flex",flexDirection:"column",gap:4}}>{moods.slice(0,14).map((m,i)=>{const md=MOODS.find(x=>x.v===m.v);return(<div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:"#0A0918",borderRadius:4,border:`1px solid ${bdr}`}}><span style={{fontSize:10,color:"#444"}}>{m.date} · {m.time}</span><span style={{fontSize:11,fontWeight:700,color:md.color}}>{md.icon} {md.label}</span></div>);})}</div></Card>)}
          {moodRows.length>0&&(<Card><Lbl>MOOD VS PERFORMANCE</Lbl>{moodRows.map(row=>(<div key={row.label} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:`1px solid ${bdr}`,fontSize:12}}><span style={{color:"#CCC"}}>{row.label}</span><span style={{color:row.wr>=50?"#A8FF78":"#FF4D6D",fontWeight:700}}>{row.wr}% WR on {row.days} day{row.days>1?"s":""}</span></div>))}</Card>)}
        </div>)}

        {tab==="drawdown"&&(<div>
          <Card>
            <Lbl>ACCOUNT SETTINGS</Lbl>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              {[["BALANCE ($)","balance","100000"],["DAILY LIMIT ($)","dailyLimit","1000"],["TODAY'S LOSS ($)","currentLoss","0"]].map(([l,k,ph])=>(<div key={k}><div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:4}}>{l}</div><Inp type="number" placeholder={ph} value={dd[k]} onChange={e=>{const u={...dd,[k]:e.target.value};setDd(u);saveData({dd:u});}}/></div>))}
            </div>
          </Card>
          {ddLimit>0&&(<Card>
            <Lbl>DANGER ZONE GAUGE</Lbl>
            <div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:42,fontWeight:900,color:ddPct>=80?"#FF4D6D":ddPct>=50?"#FFD60A":"#A8FF78",textShadow:`0 0 20px ${ddPct>=80?"#FF4D6D":ddPct>=50?"#FFD60A":"#A8FF78"}50`}}>{ddPct}%</div><div style={{fontSize:10,color:"#555",marginTop:4,letterSpacing:2}}>OF DAILY LIMIT USED</div></div>
            <div style={{background:"#12112A",borderRadius:3,height:12,overflow:"hidden",marginBottom:12}}><div style={{height:"100%",width:`${ddPct}%`,background:ddPct>=80?"linear-gradient(90deg,#FF4D6D,#FF0000)":ddPct>=50?"linear-gradient(90deg,#FFD60A,#FF6B35)":"linear-gradient(90deg,#A8FF78,#00E5FF)",transition:"width .6s",borderRadius:3}}/></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {[["LOSS SO FAR",`$${ddLoss.toLocaleString()}`,ddPct>=80?"#FF4D6D":"#CCC"],["SAFE REMAINING",`$${ddSafe.toLocaleString()}`,ddSafe<=0?"#FF4D6D":"#A8FF78"]].map(([l,v,c])=>(<div key={l} style={{textAlign:"center",padding:"12px",background:"#0A0918",borderRadius:4,border:`1px solid ${bdr}`}}><div style={{fontSize:8,color:"#444",letterSpacing:2,marginBottom:4}}>{l}</div><div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div></div>))}
            </div>
            {ddPct>=80&&<div style={{marginTop:12,padding:12,borderRadius:4,background:"#FF4D6D12",border:"1px solid #FF4D6D40",textAlign:"center",fontSize:11,color:"#FF4D6D",fontWeight:700,letterSpacing:2}}>⛔ DANGER ZONE — CONSIDER STOPPING</div>}
            {ddSafe<=0&&<div style={{marginTop:8,padding:12,borderRadius:4,background:"#FF3B3B20",border:"1px solid #FF3B3B60",textAlign:"center",fontSize:11,color:"#FF3B3B",fontWeight:700,letterSpacing:2}}>🚨 DAILY LIMIT HIT — SESSION CLOSED</div>}
          </Card>)}
        </div>)}

        {tab==="edge"&&(<div>
          <Card>
            <Lbl>MY A+ SETUP CRITERIA</Lbl>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
              {criteria.map((c,i)=>{const done=edgeChecked[i];return(<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:4,background:done?`${rc}10`:card,border:done?`1px solid ${rc}35`:`1px solid ${bdr}`,transition:"all .18s"}}>
                <button onClick={()=>setEdgeChecked(p=>({...p,[i]:!p[i]}))} style={{width:16,height:16,flexShrink:0,border:`2px solid ${done?rc:"#2A2840"}`,borderRadius:2,background:done?rc:"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .18s",padding:0,fontFamily:"inherit"}}>{done&&<span style={{color:"#000",fontSize:9,fontWeight:900}}>✓</span>}</button>
                <span style={{flex:1,fontSize:12,color:done?"#555":"#CCC",textDecoration:done?"line-through":"none"}}>{c}</span>
                <button onClick={()=>{const u=criteria.filter((_,j)=>j!==i);setCriteria(u);saveData({criteria:u});}} style={{background:"transparent",border:"none",color:"#333",cursor:"pointer",fontSize:14,padding:"0 4px"}}>×</button>
              </div>);})}
            </div>
            <div style={{display:"flex",gap:8}}>
              <Inp placeholder="Add new criteria..." value={newCrit} onChange={e=>setNewCrit(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&newCrit.trim()){const u=[...criteria,newCrit.trim()];setCriteria(u);saveData({criteria:u});setNewCrit("");}}} style={{flex:1}}/>
              <Btn onClick={()=>{if(newCrit.trim()){const u=[...criteria,newCrit.trim()];setCriteria(u);saveData({criteria:u});setNewCrit("");}}} style={{padding:"9px 16px",flexShrink:0}}>+ ADD</Btn>
            </div>
          </Card>
          <Card>
            <Lbl>SETUP SCORE</Lbl>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{fontSize:28,fontWeight:700,color:edgeColor}}>{edgePct}%</div>
              <div style={{fontSize:10,color:"#555",textAlign:"right"}}>{edgeDone}/{criteria.length} criteria met<br/><span style={{color:edgePct>=80?"#A8FF78":"#FF4D6D",fontWeight:700,fontSize:9}}>{edgePct>=80?"✅ A+ SETUP":"❌ NOT AN A+ SETUP"}</span></div>
            </div>
            <div style={{background:"#12112A",borderRadius:2,height:5,overflow:"hidden"}}><div style={{height:"100%",width:`${edgePct}%`,background:edgeColor,transition:"width .4s",borderRadius:2}}/></div>
            <div style={{fontSize:10,color:"#555",marginTop:8}}>Need 80%+ to qualify as an A+ setup.</div>
            <Btn onClick={()=>setEdgeChecked({})} color="#555" style={{marginTop:10,width:"100%",padding:"8px 0",fontSize:9,letterSpacing:2}}>RESET FOR NEXT TRADE</Btn>
          </Card>
        </div>)}

        {tab==="journal"&&(<div>
          <Card>
            <Lbl>END-OF-SESSION REVIEW · +{XP_VAL.journal} XP</Lbl>
            <div style={{background:"#0A0918",border:`1px solid ${bdr}`,borderRadius:4,padding:14,marginBottom:14,textAlign:"center"}}>
              <div style={{fontSize:13,color:"#888",lineHeight:1.7,fontStyle:"italic"}}>"Did I follow my rules today,<br/>regardless of outcome?"</div>
            </div>
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              {[{val:true,label:"✅ YES — SUCCESS",c:"#A8FF78"},{val:false,label:"❌ NO — FAILURE",c:"#FF4D6D"}].map(({val,label,c})=>(
                <button key={String(val)} onClick={()=>setJournal(j=>({...j,followedRules:val}))} style={{flex:1,padding:"12px 0",borderRadius:4,cursor:"pointer",fontFamily:"inherit",background:journal.followedRules===val?`${c}20`:card,border:`1px solid ${journal.followedRules===val?`${c}60`:bdr}`,color:journal.followedRules===val?c:"#555",fontSize:11,fontWeight:700,letterSpacing:1,transition:"all .2s"}}>{label}</button>
              ))}
            </div>
            {journal.followedRules===false&&(<div style={{marginBottom:12}}><Lbl>WHICH RULES DID YOU BREAK?</Lbl><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{["Revenge trade","FOMO entry","Moved SL","Overtraded","Wrong size","No confluence","Emotional"].map(rule=>{const sel=journal.brokenRules.includes(rule);return<button key={rule} onClick={()=>setJournal(j=>({...j,brokenRules:sel?j.brokenRules.filter(r=>r!==rule):[...j.brokenRules,rule]}))} style={{padding:"5px 10px",borderRadius:3,cursor:"pointer",fontFamily:"inherit",background:sel?"#FF4D6D20":"#0A0918",border:`1px solid ${sel?"#FF4D6D60":bdr}`,color:sel?"#FF4D6D":"#555",fontSize:10,letterSpacing:1}}>{rule}</button>;})}</div></div>)}
            <textarea value={journal.note} onChange={e=>setJournal(j=>({...j,note:e.target.value}))} placeholder="Notes (what happened, what you learned...)" style={{width:"100%",background:"#0A0918",border:`1px solid ${bdr}`,borderRadius:4,padding:12,color:"#CCC",fontSize:12,fontFamily:"inherit",resize:"vertical",minHeight:80,boxSizing:"border-box",outline:"none",lineHeight:1.6,marginBottom:10}}/>
            <button onClick={saveJournal} disabled={journal.followedRules===null} style={{width:"100%",padding:"12px 0",borderRadius:4,cursor:journal.followedRules===null?"not-allowed":"pointer",background:journal.followedRules===null?"#0A0918":`${rc}15`,border:`1px solid ${journal.followedRules===null?bdr:`${rc}40`}`,color:journal.followedRules===null?"#333":rc,fontSize:11,fontWeight:700,letterSpacing:2,fontFamily:"inherit",transition:"all .2s"}}>
              SAVE JOURNAL ENTRY · +{XP_VAL.journal} XP
            </button>
          </Card>
          {journals.length>0&&(<div><Lbl>PAST ENTRIES</Lbl><div style={{display:"flex",flexDirection:"column",gap:6}}>{journals.map((e,i)=>(<div key={i} style={{background:card,border:`1px solid ${e.followedRules?"#A8FF7825":"#FF4D6D25"}`,borderRadius:4,padding:"11px 13px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}><span style={{fontSize:9,color:"#444"}}>{e.date} · {e.time}</span><span style={{fontSize:9,fontWeight:700,letterSpacing:1,color:e.followedRules?"#A8FF78":"#FF4D6D"}}>{e.followedRules?"✓ DISCIPLINED":"✗ BROKE RULES"}</span></div>{e.brokenRules?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:5}}>{e.brokenRules.map(r=><span key={r} style={{fontSize:9,background:"#FF4D6D15",border:"1px solid #FF4D6D30",color:"#FF4D6D",padding:"2px 6px",borderRadius:2}}>{r}</span>)}</div>}{e.note&&<div style={{fontSize:11,color:"#555",lineHeight:1.5,fontStyle:"italic"}}>"{e.note}"</div>}</div>))}</div></div>)}
        </div>)}

      </div>
    </div>
  );
}

function Root(){
  const[user,setUser]=useState(null);
  const[checking,setChecking]=useState(true);
  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user||null);setChecking(false);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{setUser(session?.user||null);});
    return()=>subscription.unsubscribe();
  },[]);
  if(checking){return(<div style={{minHeight:"100vh",background:"#07070F",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}><Spinner color="#9B6DFF"/><div style={{fontSize:10,color:"#444",letterSpacing:3}}>INITIALISING...</div></div>);}
  if(!user)return<AuthScreen onAuth={setUser}/>;
  return<TraderApp user={user} onLogout={()=>setUser(null)}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
